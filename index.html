<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>APEC College Login</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: url("bg.jpg") no-repeat center center/cover;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* dark overlay */
    .overlay {
      position: absolute;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.4);
      top: 0;
      left: 0;
    }

    .login-card {
      position: relative;
      background: white;
      padding: 30px;
      width: 380px;
      border-radius: 15px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      z-index: 1;
    }

    .login-card img {
      width: 110px;
      margin-bottom: 10px;
    }

    h2 {
      font-size: 18px;
      color: #d10000;
      margin: 10px 0 5px;
    }

    h3 {
      font-size: 14px;
      color: #444;
      margin-bottom: 20px;
      font-weight: normal;
    }

    input {
      width: 90%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 25px;
      border: 1px solid #ccc;
      outline: none;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 25px;
      background: #d10000;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #a80000;
    }

    .footer {
      margin-top: 15px;
      font-size: 12px;
      color: gray;
    }
  </style>
</head>

<body>

  <div class="overlay"></div>

  <div class="login-card">

    <!-- 🔴 YOUR LOGO -->
    <img src="logo.png" alt="APEC Logo">

    <h2>ADHIPARASAKTHI ENGINEERING COLLEGE</h2>
    <h3>MELMARUVATHUR</h3>

    <form onsubmit="login(event)">
      <input type="text" placeholder="Username" required>
      <input type="password" placeholder="Password" required>
      <button type="submit">LOGIN</button>
    </form>

    <div class="footer">
      © 2026 APEC Login Portal
    </div>

  </div>

  <script>
    function login(event) {
      event.preventDefault();
      alert("Login Successful!");
    }
  </script>

</body>
</html>
